# Timers
- type: loadoutEffectGroup
  id: JamjarTimer
  effects:
  # Begin DEN: Use PlayerRequirements
  - !type:PlayerRequirementLoadoutEffect
    requirement: !type:PlayerJobPlaytimeRequirement
      job: Librarian
      minTime: 1h
      requirementType: Loadout
  # - !type:JobRequirementLoadoutEffect
  #   requirement:
  #     !type:RoleTimeRequirement
  #     role: JobLibrarian
  #     time: 1h # for being the biggest nerd on the station
  # End DEN

- type: loadoutEffectGroup
  id: JensenTimer
  effects:
  # Begin DEN: Use PlayerRequirements
  - !type:PlayerRequirementLoadoutEffect
    requirement: !type:PlayerDepartmentPlaytimeRequirement
      department: Cargo
      minTime: 10h
      requirementType: Loadout
  # - !type:JobRequirementLoadoutEffect
  #   requirement:
  #     !type:DepartmentTimeRequirement
  #     department: Cargo
  #     time: 10h # 10 hours of being a space trucker
  # End DEN

# Basic options
# Glasses
- type: loadout
  id: Glasses
  equipment:
    eyes: ClothingEyesGlasses

# Special options
# Jamjar
- type: loadout
  id: GlassesJamjar
  effects:
  - !type:GroupLoadoutEffect
    proto: JamjarTimer
  equipment:
    eyes: ClothingEyesGlassesJamjar

# Jensen
- type: loadout
  id: GlassesJensen
  effects:
  - !type:GroupLoadoutEffect
    proto: JensenTimer
  equipment:
    eyes: ClothingEyesGlassesJensen
