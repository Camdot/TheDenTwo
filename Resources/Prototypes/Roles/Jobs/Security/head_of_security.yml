- type: job
  id: HeadOfSecurity
  name: job-name-hos
  description: job-description-hos
  playTimeTracker: JobHeadOfSecurity
  # Begin DEN: Use PlayerRequirements
  # requirements:
  #   - !type:RoleTimeRequirement
  #     role: JobWarden
  #     time: 3h
  #   - !type:RoleTimeRequirement
  #     role: JobDetective
  #     time: 1h # knowing how to use the tools is important
  #   - !type:RoleTimeRequirement
  #     role: JobSecurityOfficer
  #     time: 5h
  #   - !type:DepartmentTimeRequirement
  #     department: Security
  #     time: 10h
  playerRequirements:
  - !type:PlayerJobPlaytimeRequirement
    job: Detective
    minTime: 1h
  - !type:PlayerJobPlaytimeRequirement
    job: SecurityOfficer
    minTime: 5h
  - !type:PlayerJobPlaytimeRequirement
    job: Warden
    minTime: 3h
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Security
    minTime: 10h
  # End DEN
  weight: 10
  startingGear: HoSGear
  icon: "JobIconHeadOfSecurity"
  supervisors: job-supervisors-captain
  canBeAntag: false
  access:
  - HeadOfSecurity
  - Command
  - Brig
  - Security
  - Armory
  - Maintenance
  - External
  - Detective
  - Cryogenics
  - GenpopEnter
  - GenpopLeave
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff

- type: startingGear
  id: HoSGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    id: HoSPDA
    gloves: ClothingHandsGlovesCombat
    ears: ClothingHeadsetAltSecurity
    pocket1: WeaponPistolMk58
  storage:
    back:
    - Flash
    - MagazinePistol

- type: chameleonOutfit
  id: HeadOfSecurityChameleonOutfit
  job: HeadOfSecurity
  hasMindShield: true
  equipment:
    mask: ClothingMaskGasSecurity
    neck: ClothingNeckCloakHos
