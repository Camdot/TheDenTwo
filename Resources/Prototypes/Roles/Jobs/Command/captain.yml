- type: job
  id: Captain
  name: job-name-captain
  description: job-description-captain
  playTimeTracker: JobCaptain
  # Begin DEN: Use PlayerRequirements
  # requirements:
  #   - !type:DepartmentTimeRequirement
  #     department: Engineering
  #     time: 4h
  #   - !type:DepartmentTimeRequirement
  #     department: Medical
  #     time: 4h
  #   - !type:DepartmentTimeRequirement
  #     department: Science
  #     time: 4h
  #   - !type:DepartmentTimeRequirement
  #     department: Security
  #     time: 4h
  #   - !type:DepartmentTimeRequirement
  #     department: Command
  #     time: 4h
  playerRequirements:
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Engineering
    minTime: 4h
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Medical
    minTime: 4h
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Science
    minTime: 4h
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Security
    minTime: 4h
  - !type:PlayerDepartmentPlaytimeRequirement
    department: Command
    minTime: 4h
  # End DEN
  weight: 20
  startingGear: CaptainGear
  icon: "JobIconCaptain"
  joinNotifyCrew: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  accessGroups:
  - AllAccess
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff

- type: startingGear
  id: CaptainGear
  equipment:
    shoes: ClothingShoesBootsLaceup
    eyes: ClothingEyesGlassesCommand
    gloves: ClothingHandsGlovesCaptain
    id: CaptainPDA
    ears: ClothingHeadsetAltCommand
  storage:
    back:
    - Flash
    # - StationCharter

- type: chameleonOutfit
  id: CaptainChameleonOutfit
  job: Captain
  hasMindShield: true
  equipment:
    head: ClothingHeadHatCapcap
    eyes: ClothingEyesGlassesCommand
    mask: ClothingMaskGasCaptain
    neck: ClothingNeckCloakCap
